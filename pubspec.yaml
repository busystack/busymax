name: busymax
description: BusyMax calendar and task manager.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.0
  connectivity_plus: ^7.1.0
  crypto: ^3.0.0
  desktop_multi_window: ^0.3.0
  desktop_notifications: ^0.6.3
  drift: ^2.33.0
  file_selector: ^1.0.3
  flutter_riverpod: ^2.6.0
  flutter_secure_storage: ^10.3.0
  go_router: ^17.3.0
  http: ^1.6.0
  infinite_calendar_view: ^2.11.5
  intl: ^0.20.0
  logging: ^1.3.0
  package_info_plus: ^10.1.0
  path: ^1.9.0
  path_provider: ^2.1.0
  screen_retriever: ^0.2.0
  sqlite3: ^3.3.0
  sqlite3_flutter_libs: ^0.6.0
  system_theme: ^3.3.0
  ubuntu_localizations: ^0.5.2+3
  ubuntu_widgets: ^0.8.1
  url_launcher: ^6.3.0
  uuid: ^4.5.0
  window_manager: ^0.5.1
  xdg_status_notifier_item: ^0.0.1
  yaru: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  very_good_analysis: ^10.1.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/busymax-logo.png

# Do not add google_sign_in for Linux OAuth. It does not support Linux.
# Do not add extension_google_sign_in_as_googleapis_auth for Linux OAuth.
# Do not use googleapis_auth directly in the Flutter app runtime.
